<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Delivery Update – ShipZen</title>
    <link rel="stylesheet" th:href="@{/css/deliveryUpdate.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/officer/home}">Ship<span>Zen</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#officerNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="officerNav">
            <ul class="navbar-nav gap-lg-2">
                <li class="nav-item"><a class="nav-link" th:href="@{/officer/home}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/officer/tracking}">Tracking</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/officer/delivery-update}">Delivery Status</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/officer/pickup-scheduling}">Pickup Scheduling</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/officer/history}">Previous Booking</a></li>
            </ul>
        </div>
        <div class="user-panel">
            <span class="welcome-text">Welcome, <strong th:text="${session.username}">Officer</strong></span>
            <a th:href="@{/logout}" class="btn-logout" title="Logout"><i class="bi bi-box-arrow-right"></i></a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="content-lift">

        <!-- Toast messages -->
        <div th:if="${successMsg}" class="alert alert-success d-flex align-items-center gap-2" style="border-radius:12px">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${successMsg}"></span>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger d-flex align-items-center gap-2" style="border-radius:12px">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMsg}"></span>
        </div>

        <!-- Quick Track Banner -->
        <div class="track-banner">
            <div class="track-banner-icon"><i data-lucide="search"></i></div>
            <div style="flex:1">
                <div class="track-banner-label">Quick Track</div>
                <div class="track-banner-row">
                    <div class="search-input-wrap">
                        <i data-lucide="hash"></i>
                        <input id="trackInput" type="text" placeholder="Enter Booking ID (e.g. BZ83421)"
                               th:value="${booking != null ? booking.bookingId : ''}"/>
                    </div>
                    <button class="btn-track" onclick="quickTrack()">
                        Track Parcel <i data-lucide="arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Track Result — shown when booking is loaded from DB -->
        <div class="track-result" id="trackResult" th:classappend="${booking != null ? 'visible' : ''}">
            <div class="track-result-header">
                <div>
                    <div style="font-size:0.75rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">Tracking Result</div>
                    <div class="track-result-id" th:text="${booking != null ? booking.bookingId : '—'}">—</div>
                </div>
                <span class="status-badge"
                      th:classappend="${booking != null and booking.status == 'Delivered' ? 'delivered' : 'in-transit'}"
                      th:if="${booking != null}">
                    <span class="dot"></span>
                    <span th:text="${booking.status}">—</span>
                </span>
            </div>
            <div class="track-result-body" th:if="${booking != null}">
                <div class="track-detail"><div class="track-detail-lbl">Sender</div><div class="track-detail-val" th:text="${booking.senderName}">—</div></div>
                <div class="track-detail"><div class="track-detail-lbl">Receiver</div><div class="track-detail-val" th:text="${booking.receiverName}">—</div></div>
                <div class="track-detail"><div class="track-detail-lbl">Destination</div><div class="track-detail-val" th:text="${booking.receiverAddress}">—</div></div>
                <div class="track-detail"><div class="track-detail-lbl">Weight</div><div class="track-detail-val" th:text="${booking.weight + ' kg'}">—</div></div>
                <div class="track-detail"><div class="track-detail-lbl">Pickup Time</div><div class="track-detail-val" th:text="${booking.pickupDateTime}">—</div></div>
                <div class="track-detail"><div class="track-detail-lbl">Current Location</div><div class="track-detail-val" th:text="${booking.currentLocation ?: 'Not updated'}">—</div></div>
            </div>
        </div>

        <!-- Update Status Form — POST to /officer/delivery-update -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <div class="icon"><i data-lucide="edit-3"></i></div>
                    Update Delivery Status
                </div>
            </div>
            <div class="card-body">
                <form th:action="@{/officer/delivery-update}" method="post">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Booking ID <span style="color:red">*</span></label>
                            <div class="input-with-icon">
                                <i data-lucide="hash"></i>
                                <input type="text" name="bookingId" id="updateId" placeholder="e.g. BZ83421"
                                       th:value="${booking != null ? booking.bookingId : ''}" required/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>New Status <span style="color:red">*</span></label>
                            <div class="input-with-icon">
                                <i data-lucide="tag"></i>
                                <select name="status" required>
                                    <option value="Pending"          th:selected="${booking != null and booking.status == 'Pending'}">Pending</option>
                                    <option value="Picked Up"        th:selected="${booking != null and booking.status == 'Picked Up'}">Picked Up</option>
                                    <option value="In Transit"       th:selected="${booking != null and booking.status == 'In Transit'}">In Transit</option>
                                    <option value="At Hub"           th:selected="${booking != null and booking.status == 'At Hub'}">At Hub</option>
                                    <option value="Out for Delivery" th:selected="${booking != null and booking.status == 'Out for Delivery'}">Out for Delivery</option>
                                    <option value="Delivered"        th:selected="${booking != null and booking.status == 'Delivered'}">Delivered</option>
                                    <option value="Delayed"          th:selected="${booking != null and booking.status == 'Delayed'}">Delayed</option>
                                    <option value="Returned"         th:selected="${booking != null and booking.status == 'Returned'}">Returned</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Current Location</label>
                            <div class="input-with-icon">
                                <i data-lucide="map-pin"></i>
                                <input type="text" name="currentLocation" placeholder="e.g. Kochi Sorting Facility"
                                       th:value="${booking != null ? booking.currentLocation : ''}"/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Delivery Agent</label>
                            <div class="input-with-icon">
                                <i data-lucide="user"></i>
                                <input type="text" name="deliveryAgent" placeholder="Agent name or ID"
                                       th:value="${booking != null ? booking.deliveryAgent : ''}"/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Expected Delivery Date</label>
                            <div class="input-with-icon">
                                <i data-lucide="calendar"></i>
                                <input type="date" name="expectedDeliveryDate"
                                       th:value="${booking != null ? booking.expectedDeliveryDate : ''}"/>
                            </div>
                        </div>
                        <div class="form-group full">
                            <label>Remarks / Notes</label>
                            <div class="input-with-icon">
                                <i data-lucide="message-square" style="top:14px;position:absolute"></i>
                                <textarea name="remarks" placeholder="e.g. Customer not available, attempting redelivery…"
                                          th:text="${booking != null ? booking.remarks : ''}"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="btn-row">
                        <button type="submit" class="btn-primary">
                            <i data-lucide="save"></i> Update Status
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

<script>
    lucide.createIcons();

    function quickTrack() {
        const id = document.getElementById('trackInput').value.trim();
        if (!id) { alert('Please enter a Booking ID.'); return; }
        window.location.href = '/officer/delivery-update?bookingId=' + encodeURIComponent(id);
    }

    document.getElementById('trackInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); quickTrack(); }
    });
</script>
</body>
</html>
