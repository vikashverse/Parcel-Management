<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Booking History | ShipZen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/booking-history.css}"/>
    <style>
        .status.in-transit { background:#fef3c7; color:#92400e; }
        .status.picked-up  { background:#e0f2fe; color:#0369a1; }
        .status.at-hub     { background:#ede9fe; color:#5b21b6; }
        .status.out-delivery { background:#d1fae5; color:#065f46; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/home}">Ship<span>Zen</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#shipzenNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-center" id="shipzenNav">
            <ul class="navbar-nav gap-lg-2">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/booking}">Booking Service</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/tracking}">Tracking</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/history}">Previous Booking</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/support}">Contact Support</a></li>
            </ul>
        </div>
        <div class="user-panel">
            <span class="welcome-text">Welcome, <strong th:text="${session.username}">User</strong></span>
            <a th:href="@{/logout}" class="btn-logout" title="Logout"><i class="bi bi-box-arrow-right"></i></a>
        </div>
    </div>
</nav>

<section class="history-wrapper">
    <div class="container">
        <div class="table-card">
            <h2><i class="bi bi-clock-history me-2"></i>Your Previous Bookings</h2>

            <!-- Empty state -->
            <div th:if="${bookings == null or bookings.isEmpty()}"
                 class="text-center py-5 text-muted">
                <i class="bi bi-inbox" style="font-size:3rem;opacity:0.4"></i>
                <p class="mt-3">No bookings yet. <a th:href="@{/booking}">Book your first parcel →</a></p>
            </div>

            <div th:if="${bookings != null and !bookings.isEmpty()}" class="table-responsive">
                <table class="table booking-table" id="historyTable">
                    <thead>
                        <tr>
                            <th>Customer ID</th>
                            <th>Booking ID</th>
                            <th>Booking Date</th>
                            <th>Receiver</th>
                            <th>Address</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr th:each="b : ${bookings}">
                            <td th:text="${session.userId}">—</td>
                            <td><strong th:text="${b.bookingId}">—</strong></td>
                            <td th:text="${b.bookedAtFormatted}">—</td>
                            <td th:text="${b.receiverName}">—</td>
                            <td th:text="${b.receiverAddress}">—</td>
                            <td th:text="'₹' + ${b.amount}">—</td>
                            <td>
                                <span class="status"
                                      th:classappend="${b.status == 'Delivered'        ? 'delivered'    :
                                                        b.status == 'Pending'          ? 'pending'      :
                                                        b.status == 'Returned'         ? 'cancelled'    :
                                                        b.status == 'In Transit'       ? 'in-transit'   :
                                                        b.status == 'Picked Up'        ? 'picked-up'    :
                                                        b.status == 'At Hub'           ? 'at-hub'       :
                                                        b.status == 'Out for Delivery' ? 'out-delivery' : 'pending'}"
                                      th:text="${b.status}">—</span>
                            </td>
                            <td>
                                <a th:href="@{/tracking/{id}(id=${b.bookingId})}"
                                   class="btn btn-sm btn-outline-warning rounded-pill me-1" title="Track">
                                    <i class="bi bi-geo-alt-fill"></i>
                                </a>
                                <a th:href="@{/invoice/{id}(id=${b.bookingId})}"
                                   class="btn btn-sm btn-outline-secondary rounded-pill" title="Invoice">
                                    <i class="bi bi-receipt"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div th:if="${bookings != null and !bookings.isEmpty()}"
                 class="pagination-wrapper">
                <button id="prevBtn" disabled onclick="changePage(-1)">Previous</button>
                <span id="pageInfo">Page 1</span>
                <button id="nextBtn" onclick="changePage(1)">Next</button>
            </div>

        </div>
    </div>
</section>

<script th:inline="none">
    var ROWS = 5;
    var page = 1;
    var rows = Array.from(document.querySelectorAll('#historyBody tr'));
    var total = rows.length;

    function renderPage() {
        var totalPages = Math.max(1, Math.ceil(total / ROWS));
        rows.forEach(function(r, i) {
            r.style.display = (i >= (page-1)*ROWS && i < page*ROWS) ? '' : 'none';
        });
        document.getElementById('pageInfo').textContent = 'Page ' + page + ' of ' + totalPages;
        document.getElementById('prevBtn').disabled = page === 1;
        document.getElementById('nextBtn').disabled = page >= totalPages;
    }

    function changePage(dir) {
        var totalPages = Math.ceil(total / ROWS);
        page = Math.max(1, Math.min(page + dir, totalPages));
        renderPage();
    }

    if (total > 0) renderPage();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
